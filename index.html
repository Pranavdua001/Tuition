<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuition App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#564100;
margin:0;
padding:20px;
}

h2,h3{
text-align:center;
margin:2vh;
color:#a02525;
}

.box{
max-width:1100px;
margin:auto;
background:#ffd552;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,button,select{
width:80%;
margin-left:10%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button,.innerbutton{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
margin-bottom:2vh;
}

button:hover{opacity:0.9}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#fff;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{background:#f1f5f9}

.innerbutton{
margin-bottom:1vh;
background:#2563ea
}

.hidden{display:none}

.paid{color:green;font-weight:bold}
.unpaid{color:red;font-weight:bold}
.overpaid{color:orange;font-weight:bold}

.dashboard{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.card{
flex:1;
background:white;
padding:12px;
border-radius:8px;
font-weight:bold;
text-align:center;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.controls input,
.controls select{
width:auto;
margin:0;
flex:1;
}

.table-container{
overflow-x:auto;
}

</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Tuition Login</h2>
<input id="password" type="password" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>


<div class="box hidden" id="teacherBox">

<h2>Teacher Dashboard</h2>

<div class="dashboard">
<div class="card" id="totalStudents">Students:0</div>
<div class="card" id="pendingFees">Pending:₹0</div>
<div class="card" id="collectedFees">Collected:₹0</div>
<div class="card" id="unpaidStudents">Unpaid:0</div>
<div class="card" id="paidStudents">Paid:0</div>
<div class="card" id="overpaidStudents">Overpaid:0</div>
</div>

<div class="controls">

<input id="searchStudent" placeholder="Search student..." onkeyup="renderTeacher()">

<select id="statusFilter" onchange="renderTeacher()">
<option value="all">All Students</option>
<option value="paid">Paid</option>
<option value="unpaid">Unpaid</option>
<option value="overpaid">Overpaid</option>
</select>

</div>

<button onclick="addStudent()">Add Student</button>
<button onclick="publishAll()">Publish Students</button>

<div class="table-container">
<table id="teacherTable"></table>
</div>

</div>


<div class="box hidden" id="studentBox">

<h2>Student Dashboard</h2>

<table id="studentTable"></table>

<h3>Payment History</h3>

<table id="studentHistoryTable"></table>

</div>


<script>

const TEACHER_PASSWORD="1234"
const ENCODE_KEY=7
const ENCODE_MULTIPLIER=4


function encodeJSON(str){
return Array.from(str).map(c=>(c.charCodeAt(0)+ENCODE_KEY)*ENCODE_MULTIPLIER)
}

function decodeJSON(arr){
return arr.map(n=>String.fromCharCode((n/ENCODE_MULTIPLIER)-ENCODE_KEY)).join("")
}


let teacherData=JSON.parse(localStorage.getItem("teacherData"))||{students:[]}
let loggedStudent=null


function login(){

const pwd=document.getElementById("password").value

if(pwd===TEACHER_PASSWORD){

hide("loginBox")
show("teacherBox")

updateFeeCycles()
renderTeacher()

return
}

fetch("students.json?v="+Date.now())

.then(r=>r.json())

.then(arr=>{

const students=JSON.parse(decodeJSON(arr))

const s=students.find(x=>x.password===pwd)

if(!s){alert("Invalid password");return}

loggedStudent=s

hide("loginBox")
show("studentBox")

renderStudent()

})

.catch(()=>alert("Student data not available"))

}


function addStudent(){

const name=prompt("Student name")
if(!name)return

const password=prompt("Password")
if(!password)return

const joiningdate=prompt("Joining date YYYY-MM-DD")
if(!joiningdate)return

const monthlyfees=Number(prompt("Monthly fees"))
if(isNaN(monthlyfees))return

teacherData.students.push({
name,
password,
joiningdate,
monthlyfees,
feestobepaid:monthlyfees,
feespaid:0,
lastFeeCycle:-1,
history:[]
})

save()
renderTeacher()

}


function renderTeacher(){

let html=`<tr>
<th>Name</th>
<th>Password</th>
<th>Joining</th>
<th>Monthly</th>
<th>To Pay</th>
<th>Paid</th>
<th>Remaining</th>
<th>Status</th>
<th>Actions</th>
</tr>`

teacherData.students.forEach((s,i)=>{

const remaining=s.feestobepaid-s.feespaid

let status="paid"
if(remaining>0)status="unpaid"
if(remaining<0)status="overpaid"

html+=`
<tr>
<td>${s.name}</td>
<td>${s.password}</td>
<td>${s.joiningdate}</td>
<td>₹${s.monthlyfees}</td>
<td>₹${s.feestobepaid}</td>
<td>₹${s.feespaid}</td>
<td>₹${remaining}</td>
<td class="${status}">${status}</td>
<td>

<button class="innerbutton" onclick="addPayment(${i})">Add Payment</button>

</td>
</tr>
`

})

document.getElementById("teacherTable").innerHTML=html

}


function addPayment(i){

const s=teacherData.students[i]

let val=Number(prompt("Payment amount"))

if(isNaN(val))return

s.feespaid+=val

s.history.push({
date:new Date().toISOString().split("T")[0],
amount:val
})

save()
renderTeacher()

}


function renderStudent(){

const s=loggedStudent

const remaining=s.feestobepaid-s.feespaid

let html=`
<tr>
<th>Name</th>
<th>Monthly Fee</th>
<th>Total To Pay</th>
<th>Paid</th>
<th>Remaining</th>
</tr>

<tr>
<td>${s.name}</td>
<td>₹${s.monthlyfees}</td>
<td>₹${s.feestobepaid}</td>
<td>₹${s.feespaid}</td>
<td>₹${remaining}</td>
</tr>
`

document.getElementById("studentTable").innerHTML=html


let historyHTML=`
<tr>
<th>Date</th>
<th>Amount</th>
</tr>
`

s.history.forEach(h=>{

historyHTML+=`
<tr>
<td>${h.date}</td>
<td>₹${h.amount}</td>
</tr>
`

})

document.getElementById("studentHistoryTable").innerHTML=historyHTML

}


function publishAll(){

const json=JSON.stringify(teacherData.students)

const encoded=encodeJSON(json)

const blob=new Blob([JSON.stringify(encoded)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="students.json"

a.click()

alert("Upload the downloaded students.json to your website folder")

}


function save(){
localStorage.setItem("teacherData",JSON.stringify(teacherData))
}


function updateFeeCycles(){

const today=new Date()

teacherData.students.forEach(s=>{

const joining=new Date(s.joiningdate)

let months=(today.getFullYear()-joining.getFullYear())*12+(today.getMonth()-joining.getMonth())

if(today.getDate()<joining.getDate())months--

if(months>s.lastFeeCycle){

const overdue=s.feestobepaid-s.feespaid

s.feespaid=0
s.feestobepaid=overdue+s.monthlyfees
s.lastFeeCycle=months

}

})

}


function hide(id){
document.getElementById(id).classList.add("hidden")
}

function show(id){
document.getElementById(id).classList.remove("hidden")
}

</script>

</body>
</html>
