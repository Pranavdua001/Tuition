```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuition App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#564100;
margin:0;
padding:20px;
}

h2,h3{
text-align:center;
margin:2vh;
color:#a02525;
}

.box{
max-width:1100px;
margin:auto;
background:#ffd552;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,button,select{
width:80%;
margin-left:10%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button,.innerbutton{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
margin-bottom:2vh;
}

button:hover{opacity:0.9}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#fff;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{background:#f1f5f9}

.innerbutton{
margin-bottom:1vh;
background:#2563ea
}

.hidden{display:none}

.paid{color:green;font-weight:bold}
.unpaid{color:red;font-weight:bold}
.overpaid{color:orange;font-weight:bold}

.dashboard{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.card{
flex:1;
background:white;
padding:12px;
border-radius:8px;
font-weight:bold;
text-align:center;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.controls input,
.controls select{
width:auto;
margin:0;
flex:1;
}

.table-container{
overflow-x:auto;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Tuition Login</h2>
<input id="password" type="password" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>


<!-- TEACHER DASHBOARD -->
<div class="box hidden" id="teacherBox">

<h2>Teacher Dashboard</h2>

<div class="dashboard">
<div class="card" id="totalStudents">Students:0</div>
<div class="card" id="pendingFees">Pending:₹0</div>
<div class="card" id="collectedFees">Collected:₹0</div>
<div class="card" id="unpaidStudents">Unpaid:0</div>
<div class="card" id="paidStudents">Paid:0</div>
<div class="card" id="overpaidStudents">Overpaid:0</div>
</div>

<div class="controls">

<input id="searchStudent" placeholder="Search student..." onkeyup="renderTeacher()">

<select id="statusFilter" onchange="renderTeacher()">
<option value="all">All Students</option>
<option value="paid">Paid</option>
<option value="unpaid">Unpaid</option>
<option value="overpaid">Overpaid</option>
</select>

</div>

<button onclick="addStudent()">Add Student</button>
<button onclick="publishAll()">Publish Students</button>

<button onclick="exportBackup()">Export Backup</button>

<input type="file" id="importFile" style="display:none" onchange="importBackup(event)">
<button onclick="document.getElementById('importFile').click()">Import Backup</button>

<div class="table-container">
<table id="teacherTable"></table>
</div>

</div>


<!-- STUDENT DASHBOARD -->
<div class="box hidden" id="studentBox">
<h2>Student Dashboard</h2>
<table id="studentTable"></table>

<h3>Payment History</h3>
<table id="studentHistoryTable"></table>
</div>


<script>

/* SECURITY */

const TEACHER_PASSWORD="1234"
const ENCODE_KEY=7
const ENCODE_MULTIPLIER=4


/* ENCODING */

function encodeJSON(str){
return Array.from(str).map(c=>(c.charCodeAt(0)+ENCODE_KEY)*ENCODE_MULTIPLIER)
}

function decodeJSON(arr){
return arr.map(n=>String.fromCharCode((n/ENCODE_MULTIPLIER)-ENCODE_KEY)).join("")
}


/* DATA */

let teacherData=JSON.parse(localStorage.getItem("teacherData"))||{students:[]}
let loggedStudent=null


/* LOGIN */

function login(){

const pwd=document.getElementById("password").value

if(pwd===TEACHER_PASSWORD){

hide("loginBox")
show("teacherBox")

updateFeeCycles()
renderTeacher()

return
}

fetch("students.json?v="+Date.now())

.then(r=>r.json())

.then(arr=>{

const students=JSON.parse(decodeJSON(arr))

const s=students.find(x=>x.password===pwd)

if(!s){alert("Invalid password");return}

loggedStudent=s.name

hide("loginBox")
show("studentBox")

renderStudent()

})

.catch(()=>alert("Student data not available"))

}


/* ADD STUDENT */

function addStudent(){

const name=prompt("Student name")
if(!name)return

const password=prompt("Password")
if(!password)return

const joiningdate=prompt("Joining date YYYY-MM-DD")
if(!joiningdate)return

const monthlyfees=Number(prompt("Monthly fees"))
if(isNaN(monthlyfees))return

teacherData.students.push({
name,
password,
joiningdate,
monthlyfees,
feestobepaid:0,
feespaid:0,
feesremaining:0,
lastFeeCycle:-1,
history:[]
})

updateFeeCycles()

save()
renderTeacher()

}


/* RENDER TABLE */

function renderTeacher(){

const filter=document.getElementById("statusFilter").value
const search=document.getElementById("searchStudent").value.toLowerCase()

let totalStudents=0
let pending=0
let collected=0
let unpaid=0
let paid=0
let overpaid=0

let html=`<tr>
<th>Name</th>
<th>Password</th>
<th>Joining</th>
<th>Monthly</th>
<th>To Pay</th>
<th>Paid</th>
<th>Remaining</th>
<th>Status</th>
<th>Actions</th>
</tr>`

teacherData.students.forEach((s,i)=>{

const remaining=s.feestobepaid-s.feespaid

let status="paid"
if(remaining>0)status="unpaid"
if(remaining<0)status="overpaid"

if(filter!=="all" && filter!==status)return
if(search && !s.name.toLowerCase().includes(search))return

totalStudents++

if(remaining>0){
pending+=remaining
unpaid++
}
else if(remaining===0){
paid++
}
else{
overpaid++
}

collected+=s.feespaid

html+=`
<tr>
<td>${s.name}</td>
<td>${s.password}</td>
<td>${s.joiningdate}</td>
<td>₹${s.monthlyfees}</td>
<td>₹${s.feestobepaid}</td>
<td>₹${s.feespaid}</td>
<td>₹${remaining}</td>
<td class="${status}">${status}</td>
<td>

<button class="innerbutton" onclick="editMonthlyFees(${i})">Edit Monthly</button>

<button class="innerbutton" onclick="editFeesToBePaid(${i})">Edit To Pay</button>

<button class="innerbutton" onclick="addPayment(${i})">Add Payment</button>

<button class="innerbutton" onclick="viewHistory(${i})">History</button>

<button class="innerbutton" onclick="delStudent(${i})">Delete</button>

</td>
</tr>
`

})

document.getElementById("teacherTable").innerHTML=html

document.getElementById("totalStudents").innerText="Students:"+totalStudents
document.getElementById("pendingFees").innerText="Pending:₹"+pending
document.getElementById("collectedFees").innerText="Collected:₹"+collected
document.getElementById("unpaidStudents").innerText="Unpaid:"+unpaid
document.getElementById("paidStudents").innerText="Paid:"+paid
document.getElementById("overpaidStudents").innerText="Overpaid:"+overpaid

}


/* EDIT MONTHLY */

function editMonthlyFees(i){

const s=teacherData.students[i]

let newFee=Number(prompt("New monthly fee"))

if(isNaN(newFee))return

s.monthlyfees=newFee

save()
renderTeacher()

}


/* EDIT FEES TO PAY */

function editFeesToBePaid(i){

const s=teacherData.students[i]

let val=Number(prompt("Enter fees to be paid"))

if(isNaN(val))return

s.feestobepaid=val

save()
renderTeacher()

}


/* ADD PAYMENT */

function addPayment(i){

const s=teacherData.students[i]

let val=Number(prompt("Payment amount"))

if(isNaN(val))return

s.feespaid+=val

s.history.push({
date:new Date().toISOString().split("T")[0],
type:"payment",
amount:val
})

save()
renderTeacher()

}


/* HISTORY */

function viewHistory(i){

const s=teacherData.students[i]

let text="History\n\n"

s.history.forEach((h,j)=>{
text+=`${j+1}. ${h.date} ₹${h.amount} ${h.type}\n`
})

alert(text)

}


/* DELETE */

function delStudent(i){

if(!confirm("Delete student?"))return

teacherData.students.splice(i,1)

save()
renderTeacher()

}


/* EXPORT BACKUP */

function exportBackup(){

const data=JSON.stringify(teacherData)

const blob=new Blob([data],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="tuition_backup.json"

a.click()

}


/* IMPORT BACKUP */

function importBackup(e){

const file=e.target.files[0]

if(!file)return

const reader=new FileReader()

reader.onload=function(){

teacherData=JSON.parse(reader.result)

save()

renderTeacher()

alert("Backup imported")

}

reader.readAsText(file)

}


/* FEE CYCLE */

function updateFeeCycles(){

const today=new Date()

teacherData.students.forEach(s=>{

const joining=new Date(s.joiningdate)

let months=(today.getFullYear()-joining.getFullYear())*12+(today.getMonth()-joining.getMonth())

if(today.getDate()<joining.getDate())months--

if(months>s.lastFeeCycle){

const overdue=s.feestobepaid-s.feespaid

s.feespaid=0
s.feestobepaid=overdue+s.monthlyfees
s.lastFeeCycle=months

}

})

}


/* STORAGE */

function save(){
localStorage.setItem("teacherData",JSON.stringify(teacherData))
}


/* HELPERS */

function hide(id){
document.getElementById(id).classList.add("hidden")
}

function show(id){
document.getElementById(id).classList.remove("hidden")
}

</script>

</body>
</html>
