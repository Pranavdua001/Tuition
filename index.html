<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuition App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#564100;
margin:0;
padding:20px;
}

h2,h3{
text-align:center;
margin:2vh;
color:#a02525;
}

.box{
max-width:1100px;
margin:auto;
background:#ffd552;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,button,textarea,select{
width:80%;
margin-left:10%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button,.innerbutton{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
margin-bottom:2vh;
}

button:hover{
opacity:0.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#ffffff;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#f1f5f9;
}

.innerbutton{
margin-bottom:1vh;
background:#2563ea
}

.hidden{
display:none;
}

.paid{color:green;font-weight:bold;}
.unpaid{color:red;font-weight:bold;}
.overpaid{color:orange;font-weight:bold;}

textarea{resize:none;}

.dashboard{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:8px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.controls input,
.controls select{
width:auto;
margin:0;
flex:1;
}

.table-container{
overflow-x:auto;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">

<h2>Tuition Login</h2>

<input id="password" type="password" placeholder="Enter password">

<button onclick="login()">Login</button>

</div>



<!-- TEACHER DASHBOARD -->
<div class="box hidden" id="teacherBox">

<h2>Teacher Dashboard</h2>

<div class="dashboard">

<div class="card" id="totalStudents">Students : 0</div>
<div class="card" id="totalPending">Pending : ₹0</div>
<div class="card" id="totalPaid">Collected : ₹0</div>
<div class="card" id="totalUnpaid">Unpaid Students : 0</div>

</div>

<div class="controls">

<input id="searchStudent" placeholder="Search student name..." onkeyup="renderTeacher()">

<select id="statusFilter" onchange="renderTeacher()">
<option value="all">All Students</option>
<option value="paid">Paid</option>
<option value="unpaid">Unpaid</option>
<option value="overpaid">Overpaid</option>
</select>

</div>

<button onclick="addStudent()">Add New Student</button>
<button onclick="publishAll()">Publish All Students</button>

<div class="table-container">
<table id="teacherTable"></table>
</div>

</div>



<!-- STUDENT DASHBOARD -->
<div class="box hidden" id="studentBox">

<h2>Student Dashboard</h2>

<table id="studentTable"></table>

<h3>Payment History</h3>

<table id="studentHistoryTable"></table>

</div>



<script>

/* SECURITY */

const TEACHER_PASSWORD="1234"
const ENCODE_KEY=7
const ENCODE_MULTIPLIER=4



/* ENCODING */

function encodeJSON(str){

return Array.from(str).map(c=>(c.charCodeAt(0)+ENCODE_KEY)*ENCODE_MULTIPLIER)

}

function decodeJSON(arr){

return arr.map(n=>String.fromCharCode((n/ENCODE_MULTIPLIER)-ENCODE_KEY)).join("")

}



/* DATA */

let teacherData=JSON.parse(localStorage.getItem("teacherData"))||{students:[]}
let loggedStudent=null



/* LOGIN */

function login(){

const pwd=document.getElementById("password").value

if(pwd===TEACHER_PASSWORD){

hide("loginBox")
show("teacherBox")

updateFeeCycles()
renderTeacher()

return
}

fetch("students.json?v="+Date.now())

.then(r=>r.json())

.then(arr=>{

const students=JSON.parse(decodeJSON(arr))

const s=students.find(x=>x.password===pwd)

if(!s){

alert("Invalid password")
return

}

loggedStudent=s.name

hide("loginBox")
show("studentBox")

renderStudent()

})

.catch(()=>alert("Student data not available"))

}



/* ADD STUDENT */

function addStudent(){

const name=prompt("Student Name")
if(!name)return

const password=prompt("Student Password")
if(!password)return

const joiningdate=prompt("Joining Date YYYY-MM-DD")
if(!joiningdate)return

const monthlyfees=Number(prompt("Monthly Fees"))
if(isNaN(monthlyfees))return

teacherData.students.push({

name,
password,
joiningdate,
monthlyfees,
feestobepaid:0,
feespaid:0,
feesremaining:0,
lastFeeCycle:-1,
history:[]

})

updateFeeCycles()

save()
renderTeacher()

}



/* TEACHER TABLE */

function renderTeacher(){

const filter=document.getElementById("statusFilter").value
const search=document.getElementById("searchStudent").value.toLowerCase()

let totalStudents=0
let totalPending=0
let totalPaid=0
let unpaidStudents=0

let html=`<tr>
<th>Name</th>
<th>Password</th>
<th>Joining</th>
<th>Monthly</th>
<th>To Pay</th>
<th>Paid</th>
<th>Remaining</th>
<th>Status</th>
<th>Actions</th>
</tr>`

teacherData.students.forEach((s,i)=>{

const remaining=s.feestobepaid-s.feespaid

let status="paid"
if(remaining>0)status="unpaid"
if(remaining<0)status="overpaid"

if(filter!=="all"&&filter!==status)return

if(search&&!s.name.toLowerCase().includes(search))return

totalStudents++

if(remaining>0){

totalPending+=remaining
unpaidStudents++

}

totalPaid+=s.feespaid

html+=`<tr>

<td>${s.name}</td>
<td>${s.password}</td>
<td>${s.joiningdate}</td>
<td>₹${s.monthlyfees}</td>
<td>₹${s.feestobepaid}</td>
<td>₹${s.feespaid}</td>
<td>₹${remaining}</td>

<td class="${status}">

${status.charAt(0).toUpperCase()+status.slice(1)}

</td>

<td>

<button class="innerbutton" onclick="editFees(${i})">Add Payment</button>
<button class="innerbutton" onclick="viewHistory(${i})">History</button>
<button class="innerbutton" onclick="delStudent(${i})">Delete</button>

</td>

</tr>`

})

document.getElementById("teacherTable").innerHTML=html

document.getElementById("totalStudents").innerText="Students : "+totalStudents
document.getElementById("totalPending").innerText="Pending : ₹"+totalPending
document.getElementById("totalPaid").innerText="Collected : ₹"+totalPaid
document.getElementById("totalUnpaid").innerText="Unpaid Students : "+unpaidStudents

}



/* EDIT PAYMENT */

function editFees(i){

const s=teacherData.students[i]

const remaining=s.feestobepaid-s.feespaid

let add=Number(prompt(`Payment from ${s.name} (Remaining ₹${remaining})`))

if(isNaN(add))return

s.feespaid+=add
s.feesremaining=s.feestobepaid-s.feespaid

s.history.push({

date:new Date().toISOString().split("T")[0],
type:"payment",
amount:add

})

save()
renderTeacher()

}



/* HISTORY */

function viewHistory(i){

const s=teacherData.students[i]

let h=`History for ${s.name}\n\n`

s.history.forEach((p,j)=>{

h+=`${j+1}. ${p.date} ₹${p.amount} ${p.type}\n`

})

alert(h)

}



/* DELETE */

function delStudent(i){

if(!confirm("Delete student?"))return

teacherData.students.splice(i,1)

save()
renderTeacher()

}



/* PUBLISH */

function publishAll(){

updateFeeCycles()

const encoded=encodeJSON(JSON.stringify(teacherData.students))

const blob=new Blob([JSON.stringify(encoded)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="students.json"

a.click()

}



/* STUDENT DASHBOARD */

function renderStudent(){

fetch("students.json")

.then(r=>r.json())

.then(arr=>{

const students=JSON.parse(decodeJSON(arr))

const s=students.find(x=>x.name===loggedStudent)

document.getElementById("studentTable").innerHTML=`

<tr><th>Name</th><td>${s.name}</td></tr>
<tr><th>Monthly Fees</th><td>₹${s.monthlyfees}</td></tr>
<tr><th>To Pay</th><td>₹${s.feestobepaid}</td></tr>
<tr><th>Paid</th><td>₹${s.feespaid}</td></tr>
<tr><th>Remaining</th><td>₹${s.feestobepaid-s.feespaid}</td></tr>

`

})

}



/* FEE CYCLE */

function updateFeeCycles(){

const today=new Date()

teacherData.students.forEach(s=>{

const joining=new Date(s.joiningdate)

let months=(today.getFullYear()-joining.getFullYear())*12+(today.getMonth()-joining.getMonth())

if(today.getDate()<joining.getDate())months--

if(months>s.lastFeeCycle){

const overdue=s.feestobepaid-s.feespaid

s.feespaid=0
s.feestobepaid=overdue+s.monthlyfees
s.lastFeeCycle=months

s.history.push({

date:today.toISOString().split("T")[0],
type:"fee_due",
amount:s.feestobepaid

})

}

})

}



/* STORAGE */

function save(){

localStorage.setItem("teacherData",JSON.stringify(teacherData))

}



/* HELPERS */

function hide(id){

document.getElementById(id).classList.add("hidden")

}

function show(id){

document.getElementById(id).classList.remove("hidden")

}

</script>

</body>
</html>
